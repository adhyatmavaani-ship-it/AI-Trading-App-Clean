services:
  - type: web
    name: ai-trading-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: TRADING_MODE
        value: paper
      - key: PRIMARY_EXCHANGE
        value: kraken
      - key: BACKUP_EXCHANGES
        value: '["coinbase","binance"]'
      - key: BINANCE_TESTNET
        value: "false"
      - key: PUBLIC_BASE_URL
        value: https://ai-trading-app-clean.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FIRESTORE_PROJECT_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: AUTH_API_KEYS_JSON
        sync: false

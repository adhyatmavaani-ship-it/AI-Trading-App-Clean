services:
  - type: web
    name: ai-trading-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: APP_VERSION
        value: 5c7a6e3
      - key: TRADING_MODE
        value: paper
      - key: REDIS_URL
        sync: false
      - key: FIRESTORE_PROJECT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: AUTH_API_KEYS_JSON
        value: '[{"api_key":"test123","user_id":"demo-user"}]'

# Staging environment values
# Use with: helm upgrade --install ... -f values-staging.yaml

replicaCount: 2

image:
  digest: "sha256:1111111111111111111111111111111111111111111111111111111111111111"
  pullPolicy: IfNotPresent

canary:
  enabled: false
  weight: 10
  analysis:
    durationSeconds: 120
    intervalSeconds: 10
    maxErrorRate: 0.05
    minTradeSuccessRate: 0.90
    maxLatencyMs: 500
    maxGrossExposurePct: 0.75
    maxSymbolExposurePct: 0.35
    maxThemeExposurePct: 0.45
    maxClusterExposurePct: 0.45
    maxBetaBucketExposurePct: 0.55
    maxGrossExposureDriftPct: 0.08
    maxClusterConcentrationDriftPct: 0.08
    maxBetaBucketConcentrationDriftPct: 0.08
    maxClusterTurnover: 0.50
    maxFactorSleeveBudgetTurnover: 0.30
    maxFactorSleeveBudgetGapPct: 0.18
    minimumRequestSamples: 6
    minimumTradeSamples: 0

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

config:
  ENVIRONMENT: "staging"
  LOG_LEVEL: "INFO"
  JSON_LOGS: "true"
  TRADING_MODE: "paper"
  REDIS_URL: "redis://redis-staging.trading-system:6379/0"
  BASE_RISK_PER_TRADE: "0.02"
  DAILY_LOSS_LIMIT: "0.05"
  GLOBAL_MAX_CAPITAL_LOSS: "0.10"
  ROLLING_DRAWDOWN_LIMIT: "0.06"
  PAUSE_DRAWDOWN_LIMIT: "0.10"
  MAX_CONSECUTIVE_LOSSES: "3"
  MAX_COIN_EXPOSURE_PCT: "0.20"
  AI_MODEL_VERSION: "v1"
  DEFAULT_STRATEGY: "ensemble"
  ENABLED_STRATEGIES: "ensemble,hybrid_crypto,ema_crossover,rsi,breakout"
  BINANCE_TESTNET: "true"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
  - host: trading-api-staging.example.com
    paths:
    - path: /
      pathType: Prefix
  tls:
  - secretName: trading-api-staging-tls
    hosts:
    - trading-api-staging.example.com

terminationGracePeriodSeconds: 30

networkPolicy:
  enabled: true
  policyTypes:
  - Ingress
  - Egress

rolloutMonitoring:
  enabled: true
  prometheus:
    namespace: monitoring
    serviceName: kube-prometheus-stack-prometheus
    port: 9090
  alertmanager:
    namespace: monitoring
    serviceName: kube-prometheus-stack-alertmanager
    port: 9093
  analysis:
    durationSeconds: 180
    intervalSeconds: 30
    lookbackWindow: 5m
    maxErrorRate: 0.05
    minTradeSuccessRate: 0.90
    maxLatencyMs: 500
    maxGrossExposurePct: 0.75
    maxSymbolExposurePct: 0.35
    maxThemeExposurePct: 0.45
    maxClusterExposurePct: 0.45
    maxBetaBucketExposurePct: 0.55
    maxGrossExposureDriftPct: 0.08
    maxClusterConcentrationDriftPct: 0.08
    maxBetaBucketConcentrationDriftPct: 0.08
    maxClusterTurnover: 0.50
    maxFactorSleeveBudgetTurnover: 0.30
    maxFactorSleeveBudgetGapPct: 0.18
    minimumRequestSamples: 10
    minimumTradeSamples: 0
    rollbackOnAlert: true
    alertNames:
    - TradingBackendPostPromotionHighErrorRate
    - TradingBackendPostPromotionLowTradeSuccessRate
    - TradingBackendPostPromotionHighLatency
    - TradingBackendPostPromotionHighConcentration

podMonitor:
  enabled: true
  interval: 15s
  path: /v1/monitoring/metrics
  additionalLabels: {}

prometheusRule:
  enabled: true
  for: 2m
  receiver: trading-backend-rollout
  additionalLabels: {}

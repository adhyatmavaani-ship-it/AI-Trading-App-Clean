apiVersion: v1
kind: Service
metadata:
  name: {{ include "trading-backend.fullname" . }}
  labels:
    {{- include "trading-backend.labels" . | nindent 4 }}
    rollout.track: stable
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "trading-backend.trackSelectorLabels" (dict "root" . "track" "stable") | nindent 4 }}
---
{{- if .Values.canary.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "trading-backend.resourceName" (dict "root" . "track" "canary") }}
  labels:
    {{- include "trading-backend.labels" . | nindent 4 }}
    rollout.track: canary
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "trading-backend.trackSelectorLabels" (dict "root" . "track" "canary") | nindent 4 }}
{{- end }}

server {
    listen 80;
    listen [::]:80;
    server_name quentrader.com www.quentrader.com srv1664694.hstgr.cloud _;

    root /var/www/quentrader;
    index index.html;

    access_log /var/log/nginx/quentrader.access.log;
    error_log /var/log/nginx/quentrader.error.log warn;

    client_max_body_size 10m;
    keepalive_timeout 30s;
    send_timeout 30s;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript application/wasm image/svg+xml;

    location /v1/ {
        include /etc/nginx/snippets/quentrader-api-key.conf;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_connect_timeout 10s;
    }

    location /ws/ {
        include /etc/nginx/snippets/quentrader-api-key.conf;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_connect_timeout 10s;
    }

    location /risk-coach/ {
        include /etc/nginx/snippets/quentrader-api-key.conf;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /market/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

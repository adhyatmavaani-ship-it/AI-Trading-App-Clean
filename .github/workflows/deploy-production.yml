name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      release_manifest:
        description: Production release manifest path
        required: true
        default: deploy/releases/production.json

jobs:
  deploy:
    name: Helm Deploy and Smoke (Production)
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workflow dependencies
        run: python -m pip install PyYAML websockets

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Resolve release manifest
        id: resolve
        run: python scripts/release_manifest.py resolve --manifest "${{ inputs.release_manifest }}" --github-output "$GITHUB_OUTPUT"

      - name: Run pre-deploy validation
        run: python scripts/pre_deploy_validate.py --manifest "${{ inputs.release_manifest }}"

      - name: Verify image signature
        run: python scripts/verify_image_signature.py --manifest "${{ inputs.release_manifest }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          test -n "$KUBECONFIG_B64"
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Execute canary rollout
        id: canary
        env:
          API_TOKEN: ${{ secrets.DEPLOY_SMOKE_API_TOKEN }}
        run: |
          test -n "$API_TOKEN"
          python scripts/canary_rollout.py \
            --manifest "${{ inputs.release_manifest }}" \
            --token "$API_TOKEN" \
            --github-output "$GITHUB_OUTPUT"

      - name: Run post-deploy smoke check
        env:
          API_TOKEN: ${{ secrets.DEPLOY_SMOKE_API_TOKEN }}
        run: |
          test -n "$API_TOKEN"
          python scripts/k8s_post_deploy_smoke.py \
            --namespace "${{ steps.resolve.outputs.namespace }}" \
            --deployment "${{ steps.resolve.outputs.deployment }}" \
            --service "${{ steps.resolve.outputs.service }}" \
            --context "${{ steps.resolve.outputs.context }}" \
            --token "$API_TOKEN"
      - name: Run post-promotion monitoring
        run: |
          python scripts/post_promotion_monitor.py \
            --manifest "${{ inputs.release_manifest }}" \
            --rollback-revision "${{ steps.canary.outputs.rollback_revision }}"
